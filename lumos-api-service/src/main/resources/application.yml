spring:
  application:
    name: lumos-api-service
  datasource:
    url: jdbc:postgresql://localhost:5432/lumos
    username: ${DB_USERNAME:giapnt}
    password: ${DB_PASSWORD:abcd1234}
    hikari:
      schema: lumos
  jpa:
    properties:
      hibernate:
        default_schema: lumos
  flyway:
    default-schema: lumos
    schemas:
      - lumos
    create-schemas: true
  messages:
    basename: messages
    encoding: UTF-8

app:
  cors:
    allowed-origins:
      - http://localhost:[*]
      - http://127.0.0.1:[*]
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    exposed-headers:
      - Location
    allow-credentials: true
    max-age-seconds: 3600
  security:
    jwt:
      secret: ${JWT_SECRET:lumos-demo-secret-key-lumos-demo-secret-key}
      access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:900}
      refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:2592000}
